<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article Viewer</title>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- GitHub-style markdown CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css"
  />

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
      --max-width: 860px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-top {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(248, 250, 252, 0.8);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .content-wrap {
      padding: 32px;
    }

    .markdown-body {
      background: transparent !important;
      color: var(--text);
      font-size: 18px;
      line-height: 1.85;
      max-width: none;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      color: #111827;
      letter-spacing: -0.02em;
      margin-top: 1.8em;
      margin-bottom: 0.7em;
    }

    .markdown-body h1 {
      font-size: 2rem;
      border-bottom: none;
      padding-bottom: 0;
    }

    .markdown-body h2 {
      font-size: 1.45rem;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      padding-bottom: 0.3em;
    }

    .markdown-body p {
      margin-bottom: 1.15em;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.4em;
    }

    .markdown-body blockquote {
      color: #4b5563;
      border-left: 4px solid #cbd5e1;
      background: #f8fafc;
      padding: 0.8em 1em;
      border-radius: 8px;
    }

    .markdown-body code {
      font-size: 0.92em;
      padding: 0.15em 0.35em;
      border-radius: 6px;
      background: #f3f4f6;
    }

    .markdown-body pre {
      border-radius: 12px;
      padding: 1em;
      overflow-x: auto;
    }

    .loading,
    .error {
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
      padding: 20px 0;
    }

    .error {
      color: #b91c1c;
    }

    @media (max-width: 720px) {
      body {
        padding: 20px 12px;
      }

      .content-wrap {
        padding: 22px 18px;
      }

      .markdown-body {
        font-size: 16px;
        line-height: 1.75;
      }

      .header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>How The World Works</h1>
      <p>Understand how the world works, a little better every week.</p>
    </div>

    <div class="card">
      <div class="card-top">Source: <code>data/article.md</code></div>
      <div class="content-wrap">
        <div id="status" class="loading">Loading article...</div>
        <article id="article" class="markdown-body" style="display: none;"></article>
      </div>
    </div>
  </div>

  <script>
    async function loadMarkdown() {
      const statusEl = document.getElementById("status");
      const articleEl = document.getElementById("article");

      try {
        const response = await fetch("data/article.md");

        if (!response.ok) {
          throw new Error(`Failed to load markdown file: ${response.status}`);
        }

        const markdown = await response.text();
        articleEl.innerHTML = marked.parse(markdown);

        statusEl.style.display = "none";
        articleEl.style.display = "block";
      } catch (error) {
        statusEl.className = "error";
        statusEl.textContent = `Unable to load article. ${error.message}`;
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
